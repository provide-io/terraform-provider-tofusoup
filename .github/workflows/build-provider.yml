name: 🏗️ Build Provider Binary

on:
  workflow_dispatch:
    inputs:
      upload_retention_days:
        description: 'Artifact retention days'
        required: false
        type: number
        default: 7

env:
  PYTHON_VERSION: '3.11'
  PYTHONIOENCODING: utf-8

jobs:
  build:
    name: 📦 Build for ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson((github.actor == 'nektos/act') && '{"include":[{"os":"ubuntu-24.04","platform":"linux","arch":"amd64","target":"linux_amd64"}]}' || '{"include":[{"os":"ubuntu-24.04","platform":"linux","arch":"amd64","target":"linux_amd64"},{"os":"ubuntu-24.04-arm","platform":"linux","arch":"arm64","target":"linux_arm64"},{"os":"macos-15","platform":"darwin","arch":"arm64","target":"darwin_arm64"},{"os":"macos-15-intel","platform":"darwin","arch":"amd64","target":"darwin_amd64"},{"os":"windows-2025","platform":"windows","arch":"amd64","target":"windows_amd64"}]}') }}

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.platform == 'windows' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 📖 Read VERSION
        id: version
        shell: bash
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Building version: ${VERSION}"

      - name: 🐍 Setup Python
        if: env.ACT != 'true' && github.actor != 'nektos/act'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        continue-on-error: true
        with:
          enable-cache: false

      - name: 🔧 Install dependencies
        shell: bash
        run: uv sync --group dev

      - name: 📥 Checkout Flavorpack Helpers
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: provide-io/flavorpack
          ref: v0.4.0
          path: .deps/flavorpack

      - name: 🔨 Build Flavor Helpers
        shell: bash
        run: |
          cd .deps/flavorpack
          uv sync --group dev
          uv run flavor helpers build --lang go
          echo "FLAVOR_BUILDER_BIN=$PWD/dist/bin/flavor-go-builder-${{ matrix.target }}" >> "$GITHUB_ENV"
          echo "FLAVOR_LAUNCHER_BIN=$PWD/dist/bin/flavor-go-launcher-${{ matrix.target }}" >> "$GITHUB_ENV"

      - name: 🔑 Generate temporary signing keys
        shell: bash
        run: |
          uv run flavor keygen --out-dir keys
          echo "✅ Generated temporary signing keys"
          ls -la keys/

      - name: 🧹 Clear package caches
        shell: bash
        run: |
          pip cache purge 2>/dev/null || echo "No pip cache to clear"
          uv cache clean 2>/dev/null || echo "No uv cache to clear"

      - name: 🏗️ Build PSP package
        shell: bash
        run: |
          echo "🏗️ Building PSP package (with retry on failure)..."
          if ! uv run flavor pack \
            --manifest pyproject.toml \
            --output "terraform-provider-tofusoup.psp"; then
            echo "⚠️ First build attempt failed, waiting 30s and retrying..."
            sleep 30
            python3 -m pip index versions flavorpack 2>/dev/null || true
            uv run flavor pack \
              --manifest pyproject.toml \
              --output "terraform-provider-tofusoup.psp"
          fi
          echo "✅ Built PSP package:"
          ls -la terraform-provider-tofusoup.psp

      - name: 📦 Package for Terraform
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            BINARY_NAME="terraform-provider-tofusoup_v${{ steps.version.outputs.VERSION }}.exe"
          else
            BINARY_NAME="terraform-provider-tofusoup_v${{ steps.version.outputs.VERSION }}"
          fi

          cp terraform-provider-tofusoup.psp "$BINARY_NAME"
          chmod +x "$BINARY_NAME" 2>/dev/null || true

          echo "🧪 Testing provider binary execution..."
          time ./"$BINARY_NAME" launch-context || true

          ZIP_NAME="terraform-provider-tofusoup_${{ steps.version.outputs.VERSION }}_${{ matrix.target }}.zip"
          if command -v zip &>/dev/null; then
            zip "$ZIP_NAME" "$BINARY_NAME"
          else
            7z a "$ZIP_NAME" "$BINARY_NAME"
          fi

          echo "📦 Created Terraform provider package:"
          ls -la "$ZIP_NAME"
          unzip -l "$ZIP_NAME" 2>/dev/null || 7z l "$ZIP_NAME" 2>/dev/null || true

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: provider-${{ matrix.target }}
          path: |
            terraform-provider-tofusoup_${{ steps.version.outputs.VERSION }}_${{ matrix.target }}.zip
          retention-days: ${{ inputs.upload_retention_days || 7 }}

  summary:
    name: 📋 Build Summary
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: 📥 Checkout (for VERSION file)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 📖 Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: 📊 Summary
        run: |
          echo "## 🎉 Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Built Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for target in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64 windows_amd64; do
            echo "- ✅ $target" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Conformance tests will automatically run on these artifacts." >> $GITHUB_STEP_SUMMARY
